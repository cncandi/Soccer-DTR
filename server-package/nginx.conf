# Soccer-DTR Nginx Configuration
# ================================
# Datei: /etc/nginx/sites-available/soccer-dtr

server {
    listen 80;
    listen [::]:80;
    
    # WICHTIG: Hier deine Domain eintragen!
    server_name deine-domain.de www.deine-domain.de;
    
    # Logs
    access_log /var/log/nginx/soccer-dtr-access.log;
    error_log /var/log/nginx/soccer-dtr-error.log;
    
    # Proxy zu Node.js Backend
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        
        # WebSocket Support (falls später benötigt)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;
    
    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Client Max Body Size (für File Uploads)
    client_max_body_size 10M;
}

# HTTPS Configuration (wird von certbot automatisch hinzugefügt)
# Nach SSL-Installation mit: sudo certbot --nginx -d deine-domain.de
