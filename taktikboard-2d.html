<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>2D Taktikboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1a2e;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#ccc}

/* Layout */
#app{display:flex;width:100%;height:100%}
#sidebar{width:180px;min-width:160px;background:#12122a;border-right:1px solid #2a2a4a;display:flex;flex-direction:column;overflow:hidden}
#canvas-wrap{flex:1;position:relative;overflow:hidden;background:#2d5a1b}
canvas{display:block}

/* Sidebar */
#sidebar-tabs{display:flex;border-bottom:1px solid #2a2a4a}
.stab{flex:1;padding:7px 2px;text-align:center;font-size:10px;cursor:pointer;color:#666;border-bottom:2px solid transparent;transition:color .14s,border-color .14s}
.stab.active{color:#7676d8;border-bottom-color:#7676d8}
#sidebar-content{flex:1;overflow-y:auto;padding:6px}
#sidebar-content::-webkit-scrollbar{width:4px}
#sidebar-content::-webkit-scrollbar-thumb{background:#2a2a5a;border-radius:2px}

.section-head{font-size:9px;font-weight:700;letter-spacing:1px;color:#555;margin:8px 0 4px;padding-left:3px;text-transform:uppercase}

/* Player items */
.player-item{display:flex;align-items:center;gap:6px;padding:5px 7px;border-radius:5px;cursor:pointer;margin-bottom:3px;border:1px solid #2a2a4a;background:#1a1a3e;font-size:11px;transition:background .14s,border-color .14s;user-select:none}
.player-item:hover{border-color:#7676d8;background:#25255f}
.player-item.on-field{border-color:#2f8f4e;background:#132719;box-shadow:inset 3px 0 0 #46d479}
.player-item .pnum{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:10px;flex-shrink:0;color:#fff}
.player-item .pname{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#ccc;font-size:10px}
.player-item .ppos{font-size:9px;color:#555;flex-shrink:0}

/* Tool items */
.tool-item{display:flex;align-items:center;gap:7px;padding:5px 7px;border-radius:5px;cursor:pointer;margin-bottom:3px;border:1px solid #2a2a4a;background:#1a1a3e;font-size:11px;transition:background .14s,border-color .14s;user-select:none}
.tool-item:hover{border-color:#ffaa44;background:#302706}
.tool-item.active{border-color:#ffaa44;background:#3a2600;box-shadow:inset 3px 0 0 #ffaa44}
.tool-item .ticon{font-size:14px;flex-shrink:0;width:18px;text-align:center}

/* Draw mode items */
.draw-item{display:flex;align-items:center;gap:7px;padding:5px 7px;border-radius:5px;cursor:pointer;margin-bottom:3px;border:1px solid #2a2a4a;background:#1a1a3e;font-size:11px;transition:background .14s,border-color .14s;user-select:none}
.draw-item:hover{border-color:#44ccff;background:#002a3a}
.draw-item.active{border-color:#44ccff;background:#003044;box-shadow:inset 3px 0 0 #44ccff}

/* Toolbar */
#toolbar{position:absolute;top:8px;left:50%;transform:translateX(-50%);display:flex;gap:6px;background:rgba(10,10,30,.85);border:1px solid #2a2a4a;border-radius:8px;padding:5px 8px;z-index:20;backdrop-filter:blur(4px)}
.tb-btn{background:#1a1a3e;border:1px solid #2a2a4a;color:#aaa;padding:4px 9px;border-radius:5px;cursor:pointer;font-size:11px;transition:background .14s,border-color .14s,color .14s;white-space:nowrap}
.tb-btn:hover{background:#25255f;color:#fff;border-color:#5555aa}
.tb-btn.active{background:#3a2600;color:#ffaa44;border-color:#aa6600}
.tb-btn.danger:hover{background:#3a0000;color:#ff6666;border-color:#aa0000}

/* Status bar */
#statusbar{position:absolute;bottom:0;left:0;right:0;height:24px;background:rgba(10,10,30,.8);display:flex;align-items:center;padding:0 10px;gap:16px;font-size:10px;color:#666;z-index:10}
#statusbar span{color:#888}

/* Color picker popup */
#color-popup{position:fixed;background:#1a1a3e;border:1px solid #3a3a6a;border-radius:8px;padding:12px;z-index:200;display:none;box-shadow:0 4px 20px rgba(0,0,0,.6)}
#color-popup h4{font-size:11px;color:#aaa;margin-bottom:8px}
.color-swatches{display:grid;grid-template-columns:repeat(6,24px);gap:4px;margin-bottom:8px}
.swatch{width:24px;height:24px;border-radius:4px;cursor:pointer;border:2px solid transparent;transition:transform .1s,border-color .1s}
.swatch:hover,.swatch.sel{transform:scale(1.15);border-color:#fff}
#color-popup input[type=color]{width:100%;height:28px;cursor:pointer;border:1px solid #3a3a6a;background:none;border-radius:4px;margin-bottom:6px}
#color-popup .popup-btns{display:flex;gap:6px}
#color-popup button{flex:1;padding:5px;border-radius:5px;border:1px solid #3a3a6a;cursor:pointer;font-size:11px}
#color-popup .btn-ok{background:#2a2a6a;color:#aaa}
#color-popup .btn-ok:hover{background:#3a3aaa;color:#fff}
#color-popup .btn-cancel{background:#1a1a2e;color:#666}

/* Text input popup */
#text-popup{position:fixed;background:#1a1a3e;border:1px solid #3a3a6a;border-radius:8px;padding:12px;z-index:200;display:none;box-shadow:0 4px 20px rgba(0,0,0,.6);min-width:220px}
#text-popup h4{font-size:11px;color:#aaa;margin-bottom:8px}
#text-input{width:100%;padding:6px;background:#0d0d1e;border:1px solid #3a3a6a;color:#fff;border-radius:5px;font-size:13px;margin-bottom:8px;outline:none}
#text-popup .popup-btns{display:flex;gap:6px}
#text-popup button{flex:1;padding:5px;border-radius:5px;border:1px solid #3a3a6a;cursor:pointer;font-size:11px}
#text-popup .btn-ok{background:#2a2a6a;color:#aaa}
#text-popup .btn-ok:hover{background:#3a3aaa;color:#fff}
#text-popup .btn-cancel{background:#1a1a2e;color:#666}

/* Context menu */
#ctx-menu{position:fixed;background:#1a1a3e;border:1px solid #3a3a6a;border-radius:7px;padding:4px 0;z-index:300;display:none;min-width:140px;box-shadow:0 4px 16px rgba(0,0,0,.5)}
.ctx-item{padding:6px 14px;font-size:11px;color:#ccc;cursor:pointer;transition:background .1s}
.ctx-item:hover{background:#25255f;color:#fff}
.ctx-sep{height:1px;background:#2a2a4a;margin:3px 0}

/* Arrow color selector */
#draw-color-row{display:flex;align-items:center;gap:5px;margin-bottom:4px;padding:4px 6px;background:#0d0d1e;border-radius:5px}
#draw-color-row label{font-size:9px;color:#aaa}
.arrow-swatch{width:16px;height:16px;border-radius:3px;cursor:pointer;border:2px solid transparent;flex-shrink:0}
.arrow-swatch.sel{border-color:#fff}
#draw-color-custom{width:22px;height:16px;border:1px solid #3a3a6a;background:none;border-radius:3px;cursor:pointer;padding:0}
#draw-style-row{display:flex;gap:4px;margin-bottom:4px;padding:4px 6px;background:#0d0d1e;border-radius:5px}
#draw-style-row button{flex:1;padding:3px;border:1px solid #2a2a4a;background:#1a1a3e;color:#888;border-radius:4px;cursor:pointer;font-size:10px}
#draw-style-row button.active{background:#003044;color:#44ccff;border-color:#44ccff}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="sidebar-tabs">
      <div class="stab active" id="tab-players" onclick="showTab('players')">Spieler</div>
      <div class="stab" id="tab-tools" onclick="showTab('tools')">Tools</div>
      <div class="stab" id="tab-draw" onclick="showTab('draw')">Zeichnen</div>
    </div>
    <div id="sidebar-content">
      <!-- filled by JS -->
    </div>
  </div>
  <div id="canvas-wrap">
    <canvas id="c"></canvas>
    <div id="toolbar">
      <button class="tb-btn" onclick="undo()">↩ Undo</button>
      <button class="tb-btn" onclick="clearAll()">🗑 Leeren</button>
      <button class="tb-btn" onclick="toggleNames()" id="btn-names">Namen: Aus</button>
      <button class="tb-btn" onclick="autoPlace2d()">⚡ Auto-Aufstellung</button>
      <button class="tb-btn" onclick="exportPng()">📷 PNG</button>
    </div>
    <div id="formation-bar-2d" style="display:none;position:absolute;bottom:30px;left:50%;transform:translateX(-50%);display:flex;gap:5px;background:rgba(10,10,30,.85);border:1px solid #2a2a4a;border-radius:8px;padding:5px 8px;z-index:20;backdrop-filter:blur(4px);flex-wrap:nowrap">
      <button class="tb-btn fbtn2d active" id="fbtn-4-3-3" onclick="applyFormation2d('4-3-3')">4-3-3</button>
      <button class="tb-btn fbtn2d" id="fbtn-4-4-2" onclick="applyFormation2d('4-4-2')">4-4-2</button>
      <button class="tb-btn fbtn2d" id="fbtn-4-2-3-1" onclick="applyFormation2d('4-2-3-1')">4-2-3-1</button>
      <button class="tb-btn fbtn2d" id="fbtn-3-5-2" onclick="applyFormation2d('3-5-2')">3-5-2</button>
      <button class="tb-btn fbtn2d" id="fbtn-5-3-2" onclick="applyFormation2d('5-3-2')">5-3-2</button>
      <button class="tb-btn fbtn2d" id="fbtn-3-4-3" onclick="applyFormation2d('3-4-3')">3-4-3</button>
    </div>
    <div id="statusbar">
      <span id="s-mode">Modus: Auswahl</span>
      <span id="s-players">Feld: 0 Spieler</span>
      <span id="s-hint">Klick: auswählen · Doppelklick: entfernen · Rechtsklick: Optionen</span>
    </div>
  </div>
</div>

<!-- Color picker -->
<div id="color-popup">
  <h4 id="color-popup-title">Farbe wählen</h4>
  <div class="color-swatches" id="color-swatches"></div>
  <input type="color" id="color-custom" value="#ff6600">
  <div class="popup-btns">
    <button class="btn-ok" onclick="colorPopupOk()">OK</button>
    <button class="btn-cancel" onclick="colorPopupCancel()">Abbrechen</button>
  </div>
</div>

<!-- Text popup -->
<div id="text-popup">
  <h4>Text eingeben</h4>
  <input type="text" id="text-input" placeholder="Text…" maxlength="80">
  <div class="popup-btns">
    <button class="btn-ok" onclick="textPopupOk()">OK</button>
    <button class="btn-cancel" onclick="textPopupCancel()">Abbrechen</button>
  </div>
</div>

<!-- Context menu -->
<div id="ctx-menu">
  <div class="ctx-item" id="ctx-delete" onclick="ctxDelete()">🗑 Entfernen</div>
  <div class="ctx-item" id="ctx-color" onclick="ctxColor()">🎨 Farbe ändern</div>
  <div class="ctx-item" id="ctx-label" onclick="ctxLabel()">✏️ Name ändern</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" id="ctx-front" onclick="ctxFront()">↑ Vordergrund</div>
  <div class="ctx-item" id="ctx-back" onclick="ctxBack()">↓ Hintergrund</div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
// Echte Spielfeldmaße je Sportart (Meter)
const SPORT_FIELD_SIZES = {
  Fussball:        { w: 105, h: 68  }, // FIFA
  Handball:        { w: 40,  h: 20  }, // IHF
  Basketball:      { w: 28,  h: 15  }, // FIBA
  Eishockey:       { w: 60,  h: 26  }, // IIHF
  Volleyball:      { w: 18,  h: 9   }, // FIVB
  'Andere Sportart':{ w: 100, h: 60  }
};

let FIELD = { w: 105, h: 68 }; // wird per Sport gesetzt

function updateFieldDimensions(){
  const size = SPORT_FIELD_SIZES[currentSport] || SPORT_FIELD_SIZES['Andere Sportart'];
  FIELD = { w: size.w, h: size.h };
}
const GOAL_W = 7.32, GOAL_H = 2.44;

const COLORS_HOME = '#e63946';
const COLORS_AWAY = '#457b9d';
const COLORS_GK   = '#f4a261';

const PRESET_COLORS = [
  '#e63946','#457b9d','#f4a261','#2a9d8f','#e9c46a','#ffffff',
  '#6a0572','#023e8a','#1b4332','#ffb703','#333333','#aaaaaa'
];

// ============================================================
// STATE
// ============================================================
let objects   = [];   // all canvas objects
let drawLines = [];   // drawn arrows/lines
let selected  = null; // selected object id
let undoStack = [];

let dragObj   = null;
let dragOffX  = 0, dragOffY = 0;
let dragMoved = false;
let dragStartFx = 0, dragStartFy = 0;
let isPanning = false;
let panStart  = {x:0,y:0};
let panOff    = {x:0,y:0};
let zoom      = 1;

let currentTab   = 'players';
let drawMode     = null; // null | 'arrow' | 'dashed' | 'wave' | 'text'
let drawStart    = null;
let arrowColor   = '#ffffff';
let arrowStyle   = 'solid'; // solid | dashed | wave
let showNames    = false;

let colorPopupCallback = null;
let colorPopupMode     = null; // 'player' | 'cone' | 'arrow'

let ctxTarget = null;

let kadrivoBoardId = null;
let kadrivoReady   = false;
let kadrivoHydrating = false;
let kadrivoSaveTimer = null;

let kadrivoPlayers = [];
let homeColor = COLORS_HOME;
let awayColor = COLORS_AWAY;
let gkColor   = COLORS_GK;

// Object id counter
let oidSeq = 1;
function newId(){ return 'o' + (oidSeq++); }

// ============================================================
// CANVAS SETUP
// ============================================================
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

let fieldRect = {x:0,y:0,w:0,h:0}; // canvas pixels

function resize(){
  const wrap = document.getElementById('canvas-wrap');
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  panOff = {x:0,y:0};
  zoom = 1;
  calcFieldRect();
  render();
}

function calcFieldRect(){
  const pad = 40;
  const cw = canvas.width, ch = canvas.height;
  const aspect = FIELD.w / FIELD.h;
  let fw = cw - pad*2, fh = ch - pad*2;
  if(fw/fh > aspect) fw = fh * aspect;
  else fh = fw / aspect;
  fieldRect = {
    x: (cw - fw)/2 + panOff.x,
    y: (ch - fh)/2 + panOff.y,
    w: fw * zoom,
    h: fh * zoom
  };
}

// ============================================================
// COORDINATE HELPERS
// ============================================================
// field coords [0..FIELD.w, 0..FIELD.h] ↔ canvas pixels
function fieldToCanvas(fx, fy){
  return {
    x: fieldRect.x + (fx / FIELD.w) * fieldRect.w,
    y: fieldRect.y + (fy / FIELD.h) * fieldRect.h
  };
}
function canvasToField(cx, cy){
  return {
    x: ((cx - fieldRect.x) / fieldRect.w) * FIELD.w,
    y: ((cy - fieldRect.y) / fieldRect.h) * FIELD.h
  };
}
function fieldScale(){ return fieldRect.w / FIELD.w; }

// ============================================================
// RENDER
// ============================================================
function render(){
  calcFieldRect();
  const cw = canvas.width, ch = canvas.height;
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0,0,cw,ch);
  drawField();
  drawLines.forEach(drawArrow);
  objects.forEach(drawObj);
  if(drawStart && mousePos) drawPreviewLine(drawStart, mousePos);
}

function drawField(){
  switch(currentSport){
    case 'Handball':   drawHandballField(); break;
    case 'Basketball': drawBasketballField(); break;
    case 'Eishockey':  drawEishockeyField(); break;
    case 'Volleyball': drawVolleyballField(); break;
    default:           drawSoccerField(); break;
  }
}

// ── FUSSBALL ─────────────────────────────────────────────────
function drawSoccerField(){
  const {x,y,w,h} = fieldRect;
  const s = fieldScale();
  const stripes=10, sw=w/stripes;
  for(let i=0;i<stripes;i++){
    ctx.fillStyle=i%2===0?'#3a7a22':'#428a28';
    ctx.fillRect(x+i*sw,y,sw,h);
  }
  ctx.strokeStyle='rgba(255,255,255,0.85)'; ctx.lineWidth=2;
  ctx.strokeRect(x,y,w,h);
  ctx.beginPath(); ctx.moveTo(x+w/2,y); ctx.lineTo(x+w/2,y+h); ctx.stroke();
  ctx.beginPath(); ctx.arc(x+w/2,y+h/2,9.15*s,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(x+w/2,y+h/2,3,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.fill();
  drawSoccerPenaltyArea(x,y,w,h,s,'left');
  drawSoccerPenaltyArea(x,y,w,h,s,'right');
  drawSoccerGoal(x,y,w,h,s,'left');
  drawSoccerGoal(x,y,w,h,s,'right');
}
function drawSoccerPenaltyArea(x,y,w,h,s,side){
  const pw=16.5*s,ph=40.32*s,px=side==='left'?x:x+w-pw,py=y+(h-ph)/2;
  ctx.strokeStyle='rgba(255,255,255,0.85)'; ctx.lineWidth=2;
  ctx.strokeRect(px,py,pw,ph);
  const gaw=5.5*s,gah=18.32*s,gax=side==='left'?x:x+w-gaw,gay=y+(h-gah)/2;
  ctx.strokeRect(gax,gay,gaw,gah);
  const spotX=side==='left'?x+11*s:x+w-11*s,spotY=y+h/2;
  ctx.beginPath(); ctx.arc(spotX,spotY,3,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.85)'; ctx.fill();
  const aS=side==='left'?-0.93:Math.PI-0.93,aE=side==='left'?0.93:Math.PI+0.93;
  ctx.beginPath(); ctx.arc(spotX,spotY,9.15*s,aS,aE); ctx.stroke();
  const corners=side==='left'?[{cx:x,cy:y},{cx:x,cy:y+h}]:[{cx:x+w,cy:y},{cx:x+w,cy:y+h}];
  corners.forEach(({cx,cy},i)=>{
    const sa=side==='left'?(i===0?0:-Math.PI/2):(i===0?Math.PI/2:Math.PI);
    ctx.beginPath(); ctx.arc(cx,cy,s,sa,sa+Math.PI/2); ctx.stroke();
  });
}
function drawSoccerGoal(x,y,w,h,s,side){
  const gw=GOAL_H*s,gh=GOAL_W*s,gx=side==='left'?x-gw:x+w,gy=y+(h-gh)/2;
  ctx.strokeStyle='rgba(220,220,220,0.7)'; ctx.lineWidth=2;
  ctx.strokeRect(gx,gy,gw,gh);
  ctx.fillStyle='rgba(255,255,255,0.06)'; ctx.fillRect(gx,gy,gw,gh);
}

// ── HANDBALL ─────────────────────────────────────────────────
// 40×20m | Torraum 6m | Freiwurflinie 9m | Tor 3×2m
function drawHandballField(){
  const {x,y,w,h}=fieldRect, s=fieldScale();
  const stripes=10, sw=w/stripes;
  for(let i=0;i<stripes;i++){
    ctx.fillStyle=i%2===0?'#c8a05a':'#d4aa60';
    ctx.fillRect(x+i*sw,y,sw,h);
  }
  ctx.strokeStyle='#ffffff'; ctx.lineWidth=2; ctx.strokeRect(x,y,w,h);
  ctx.beginPath(); ctx.moveTo(x+w/2,y); ctx.lineTo(x+w/2,y+h); ctx.stroke();
  ctx.beginPath(); ctx.arc(x+w/2,y+h/2,3,0,Math.PI*2);
  ctx.fillStyle='#fff'; ctx.fill();
  ['left','right'].forEach(side=>{
    const cx=side==='left'?x:x+w, cy=y+h/2;
    const r6=6*s;
    ctx.fillStyle='rgba(200,160,60,0.4)';
    ctx.beginPath();
    if(side==='left'){ ctx.moveTo(cx,cy-r6); ctx.arc(cx,cy,r6,-Math.PI/2,Math.PI/2); }
    else { ctx.moveTo(cx,cy-r6); ctx.arc(cx,cy,r6,-Math.PI/2,Math.PI/2,true); }
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#ffffff'; ctx.lineWidth=2; ctx.stroke();
    const r9=9*s;
    ctx.strokeStyle='#ffffff'; ctx.lineWidth=1.5; ctx.setLineDash([8,6]);
    ctx.beginPath();
    if(side==='left') ctx.arc(cx,cy,r9,-Math.PI/2,Math.PI/2);
    else ctx.arc(cx,cy,r9,-Math.PI/2,Math.PI/2,true);
    ctx.stroke(); ctx.setLineDash([]);
    const m7x=side==='left'?x+7*s:x+w-7*s;
    ctx.strokeStyle='#ffffff'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(m7x,cy-0.5*s); ctx.lineTo(m7x,cy+0.5*s); ctx.stroke();
    const gTw=3*s,gTh=2*s,gTx=side==='left'?x-gTh:x+w,gTy=cy-gTw/2;
    ctx.fillStyle='rgba(255,255,255,0.12)'; ctx.fillRect(gTx,gTy,gTh,gTw);
    ctx.strokeStyle='rgba(255,255,255,0.9)'; ctx.lineWidth=2.5; ctx.strokeRect(gTx,gTy,gTh,gTw);
  });
}

// ── BASKETBALL ───────────────────────────────────────────────
// 28×15m | 3-Punkt r=6.75m | Key 5.8×4.9m
function drawBasketballField(){
  const {x,y,w,h}=fieldRect, s=fieldScale();
  const stripes=14, sh=h/stripes;
  for(let i=0;i<stripes;i++){
    ctx.fillStyle=i%2===0?'#d4916a':'#c8845f';
    ctx.fillRect(x,y+i*sh,w,sh);
  }
  ctx.strokeStyle='#ffffff'; ctx.lineWidth=2; ctx.strokeRect(x,y,w,h);
  ctx.beginPath(); ctx.moveTo(x+w/2,y); ctx.lineTo(x+w/2,y+h); ctx.stroke();
  ctx.beginPath(); ctx.arc(x+w/2,y+h/2,1.8*s,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(x+w/2,y+h/2,3,0,Math.PI*2);
  ctx.fillStyle='#fff'; ctx.fill();
  ['left','right'].forEach(side=>{
    const ex=side==='left'?x:x+w, cy=y+h/2;
    const kw=5.8*s,kh=4.9*s,kx=side==='left'?x:x+w-kw,ky=cy-kh/2;
    ctx.fillStyle='rgba(200,130,80,0.4)'; ctx.fillRect(kx,ky,kw,kh);
    ctx.strokeStyle='#ffffff'; ctx.lineWidth=2; ctx.strokeRect(kx,ky,kw,kh);
    const fwx=side==='left'?x+kw:x+w-kw;
    ctx.beginPath();
    if(side==='left') ctx.arc(fwx,cy,kh/2,-Math.PI/2,Math.PI/2);
    else ctx.arc(fwx,cy,kh/2,Math.PI/2,-Math.PI/2);
    ctx.setLineDash([5,4]); ctx.stroke(); ctx.setLineDash([]);
    ctx.strokeStyle='#ffffff'; ctx.lineWidth=2;
    ctx.beginPath();
    if(side==='left'){ ctx.moveTo(x,y+0.9*s); ctx.lineTo(x,cy-3*s); ctx.arc(ex,cy,6.75*s,Math.PI*1.5,Math.PI*0.5); ctx.lineTo(x,y+h-0.9*s); }
    else { ctx.moveTo(x+w,y+0.9*s); ctx.lineTo(x+w,cy-3*s); ctx.arc(ex,cy,6.75*s,Math.PI*0.5,Math.PI*1.5); ctx.lineTo(x+w,y+h-0.9*s); }
    ctx.stroke();
    const bx=side==='left'?x+1.575*s:x+w-1.575*s;
    ctx.strokeStyle='rgba(255,180,50,0.9)'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(bx,cy,0.45*s,0,Math.PI*2); ctx.stroke();
    const bW=1.83*s,bH=1.07*s,bX=side==='left'?x-bH:x+w;
    ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=1.5;
    ctx.strokeRect(bX,cy-bW/2,bH,bW);
  });
}

// ── EISHOCKEY ────────────────────────────────────────────────
// 60×26m (NHL) | Abgerundete Ecken | Rot/Blau Linien
function drawEishockeyField(){
  const {x,y,w,h}=fieldRect, s=fieldScale();
  const r=8.5*s;
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
  ctx.fillStyle='#d0e8f5'; ctx.fill();
  ctx.strokeStyle='#1a5276'; ctx.lineWidth=3; ctx.stroke();
  ctx.restore();
  ctx.strokeStyle='#cc0000'; ctx.lineWidth=4;
  ctx.beginPath(); ctx.moveTo(x+w/2,y+4); ctx.lineTo(x+w/2,y+h-4); ctx.stroke();
  ctx.beginPath(); ctx.arc(x+w/2,y+h/2,0.3*s,0,Math.PI*2);
  ctx.fillStyle='#cc0000'; ctx.fill();
  ctx.strokeStyle='#0044aa'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(x+w/2,y+h/2,4.5*s,0,Math.PI*2); ctx.stroke();
  ctx.strokeStyle='#0044aa'; ctx.lineWidth=4;
  // Blaue Linien: 7.3m von der Mittellinie (IIHF)
  const bl1=x+w/2-7.3*s, bl2=x+w/2+7.3*s;
  [[bl1,y+4,bl1,y+h-4],[bl2,y+4,bl2,y+h-4]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  });
  ctx.strokeStyle='#cc0000'; ctx.lineWidth=2;
  [[x+4*s,y+4,x+4*s,y+h-4],[x+w-4*s,y+4,x+w-4*s,y+h-4]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  });
  ['left','right'].forEach(side=>{
    const ex=side==='left'?x:x+w, cy=y+h/2;
    const gw2=1.22*s,gh2=1.83*s,gx2=side==='left'?x+4*s-gw2:x+w-4*s,gy2=cy-gh2/2;
    ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.fillRect(gx2,gy2,gw2,gh2);
    ctx.strokeStyle='rgba(255,60,60,0.9)'; ctx.lineWidth=2.5; ctx.strokeRect(gx2,gy2,gw2,gh2);
    ctx.fillStyle='rgba(0,68,170,0.15)';
    const goalX=side==='left'?x+4*s:x+w-4*s;
    ctx.beginPath();
    if(side==='left') ctx.arc(goalX,cy,1.83*s,-Math.PI/2,Math.PI/2);
    else ctx.arc(goalX,cy,1.83*s,-Math.PI/2,Math.PI/2,true);
    ctx.fill();
    ctx.strokeStyle='#cc0000'; ctx.lineWidth=1.5; ctx.stroke();
    // Anspielpunkte: 7m von Torlinie (bei 4m Torlinie → 11m vom Ende), ±6.7m von Mitte
    const dotX=side==='left'?x+11*s:x+w-11*s;
    [cy-6.7*s,cy+6.7*s].forEach(dy=>{
      ctx.strokeStyle='#cc0000'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(dotX,dy,1.8*s,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(dotX,dy,0.15*s,0,Math.PI*2);
      ctx.fillStyle='#cc0000'; ctx.fill();
      ctx.beginPath();
      ctx.moveTo(dotX-0.4*s,dy); ctx.lineTo(dotX+0.4*s,dy);
      ctx.moveTo(dotX,dy-0.4*s); ctx.lineTo(dotX,dy+0.4*s);
      ctx.stroke();
    });
  });
  // Neutrale Zone: 4 Anspielpunkte (±1.5m von Mittellinie, ±6.7m von Mitte)
  [[x+w/2-1.5*s,y+h/2-6.7*s],[x+w/2+1.5*s,y+h/2-6.7*s],
   [x+w/2-1.5*s,y+h/2+6.7*s],[x+w/2+1.5*s,y+h/2+6.7*s]].forEach(([dx,dy])=>{
    ctx.beginPath(); ctx.arc(dx,dy,0.15*s,0,Math.PI*2);
    ctx.fillStyle='#cc0000'; ctx.fill();
  });
}

// ── VOLLEYBALL ───────────────────────────────────────────────
// 18×9m | Mittellinie+Netz | Angriffslinie 3m vom Netz
function drawVolleyballField(){
  const {x,y,w,h}=fieldRect, s=fieldScale();
  // Außenbereich (3m Freizone = 0.5m visuell damit Feld sichtbar bleibt)
  ctx.fillStyle='#2980b9'; ctx.fillRect(x,y,w,h);
  // Spielfläche (das gesamte fieldRect ist schon das 18×9m Feld)
  ctx.fillStyle='#5dade2'; ctx.fillRect(x,y,w,h);
  // Feldrand
  ctx.strokeStyle='#ffffff'; ctx.lineWidth=2; ctx.strokeRect(x,y,w,h);
  // Mittellinie/Netz
  const netX=x+w/2;
  ctx.strokeStyle='#ffffff'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(netX,y); ctx.lineTo(netX,y+h); ctx.stroke();
  // Netz-Pfosten
  ctx.fillStyle='rgba(255,255,255,0.9)';
  ctx.fillRect(netX-0.12*s,y-0.5*s,0.24*s,1*s);
  ctx.fillRect(netX-0.12*s,y+h-0.5*s,0.24*s,1*s);
  // Angriffslinie (3m vom Netz auf jeder Seite)
  const att1=x+w/2-3*s, att2=x+w/2+3*s;
  ctx.strokeStyle='#ffffff'; ctx.lineWidth=2; ctx.setLineDash([6,5]);
  ctx.beginPath(); ctx.moveTo(att1,y); ctx.lineTo(att1,y+h); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(att2,y); ctx.lineTo(att2,y+h); ctx.stroke();
  ctx.setLineDash([]);
  // Service-Zone Marker (kleine Striche am Rand)
  [-0.9*s,0.9*s].forEach(dy=>{
    ctx.fillStyle='rgba(255,255,255,0.8)';
    ctx.fillRect(x-0.1*s,y+h/2+dy-0.08*s,0.6*s,0.16*s);
    ctx.fillRect(x+w-0.5*s,y+h/2+dy-0.08*s,0.6*s,0.16*s);
  });
}


// ============================================================
// DRAW OBJECTS
// ============================================================
function drawObj(obj){
  const {x,y,w,h} = fieldRect;
  const s = fieldScale();
  const p = fieldToCanvas(obj.fx, obj.fy);
  const sel = obj.id === selected;

  ctx.save();
  ctx.translate(p.x, p.y);

  if(sel){
    ctx.shadowColor = '#ffff00';
    ctx.shadowBlur  = 12;
  }

  if(obj.type === 'player')      drawPlayer(obj, s, sel);
  else if(obj.type === 'cone')   drawCone(obj, s);
  else if(obj.type === 'ball')   drawBall(obj, s);
  else if(obj.type === 'pole')   drawPole(obj, s);
  else if(obj.type === 'goal')   drawGoalObj(obj, s);
  else if(obj.type === 'text')   drawTextObj(obj, s);

  ctx.restore();
}

function drawPlayer(obj, s, sel){
  const r = obj.isBench ? 10 : 14;
  const col = obj.color || '#e63946';
  // Shadow
  ctx.beginPath();
  ctx.ellipse(0, r*0.7, r*0.7, r*0.25, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fill();
  // Body circle - bench players get dashed border
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI*2);
  ctx.fillStyle = col;
  ctx.fill();
  if(obj.isBench){
    ctx.save();
    ctx.setLineDash([3,2]);
    ctx.strokeStyle = sel ? '#ffff00' : 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(0,0,r,0,Math.PI*2);
    ctx.stroke();
    ctx.restore();
    // "B" label overlay for bench
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath();
    ctx.arc(r-2, -r+2, 5, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#ffcc00';
    ctx.font = 'bold 6px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('B', r-2, -r+2);
  } else {
    ctx.strokeStyle = sel ? '#ffff00' : 'rgba(255,255,255,0.7)';
    ctx.lineWidth = sel ? 2.5 : 1.5;
    ctx.beginPath();
    ctx.arc(0,0,r,0,Math.PI*2);
    ctx.stroke();
  }
  // Number / initials
  const label = obj.num ? String(obj.num) : (obj.name || '?').substring(0,2).toUpperCase();
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${r > 12 ? 11 : 9}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowBlur = 0;
  ctx.fillText(label, 0, 0);
  // Name below
  if(showNames && obj.name){
    ctx.font = '9px sans-serif';
    ctx.fillStyle = obj.isBench ? '#ffcc00' : '#fff';
    ctx.shadowColor = '#000';
    ctx.shadowBlur = 3;
    ctx.fillText(obj.name, 0, r+9);
    ctx.shadowBlur = 0;
  }
}

function drawCone(obj, s){
  const c = obj.color || '#ff5500';
  const sz = 10;
  // Triangle shape
  ctx.beginPath();
  ctx.moveTo(0, -sz);
  ctx.lineTo(-sz*0.7, sz*0.4);
  ctx.lineTo(sz*0.7,  sz*0.4);
  ctx.closePath();
  ctx.fillStyle = c;
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.5)';
  ctx.lineWidth = 1;
  ctx.stroke();
  // Base shadow
  ctx.beginPath();
  ctx.ellipse(0, sz*0.4, sz*0.7, sz*0.2, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fill();
}

function drawBall(obj, s){
  const r = 9;
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI*2);
  ctx.fillStyle = '#fff';
  ctx.fill();
  // Pentagon pattern (simplified as arcs)
  ctx.fillStyle = '#111';
  for(let i=0;i<5;i++){
    const a = (i/5)*Math.PI*2;
    const bx = Math.cos(a)*r*0.45, by = Math.sin(a)*r*0.45;
    ctx.beginPath();
    ctx.arc(bx, by, r*0.22, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.beginPath();
  ctx.arc(0,0,r*0.18,0,Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(0,0,r,0,Math.PI*2);
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  ctx.stroke();
}

function drawPole(obj, s){
  const c = obj.color || '#cc0000';
  const isH = obj.horizontal;
  ctx.strokeStyle = c;
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  if(isH){ ctx.moveTo(-20,0); ctx.lineTo(20,0); }
  else    { ctx.moveTo(0,-20); ctx.lineTo(0,20); }
  ctx.stroke();
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  if(isH){ ctx.moveTo(-18,-1); ctx.lineTo(18,-1); }
  else    { ctx.moveTo(-1,-18); ctx.lineTo(-1,18); }
  ctx.stroke();
}

function drawGoalObj(obj, s){
  const sw = obj.goalW || 7.32;
  const sh = obj.goalH || 2.44;
  const pw = sw * fieldScale() * 0.5;
  const ph = sh * fieldScale() * 0.5;
  ctx.strokeStyle = 'rgba(220,220,220,0.9)';
  ctx.lineWidth = 2.5;
  ctx.strokeRect(-pw/2, -ph/2, pw, ph);
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  ctx.fillRect(-pw/2, -ph/2, pw, ph);
}

function drawTextObj(obj, s){
  const txt = obj.text || '';
  const fs = obj.fontSize || 14;
  ctx.font = `${obj.bold?'bold ':''} ${fs}px sans-serif`;
  ctx.fillStyle = obj.color || '#ffff00';
  ctx.strokeStyle = 'rgba(0,0,0,0.7)';
  ctx.lineWidth = 3;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowBlur = 0;
  ctx.strokeText(txt, 0, 0);
  ctx.fillText(txt, 0, 0);
}

// ============================================================
// DRAW ARROWS / LINES
// ============================================================
function drawArrow(line){
  const a = fieldToCanvas(line.x1, line.y1);
  const b = fieldToCanvas(line.x2, line.y2);
  const col  = line.color || '#ffffff';
  const style= line.style || 'solid';
  const lw   = 2.5;

  ctx.save();
  ctx.strokeStyle = col;
  ctx.lineWidth   = lw;
  ctx.lineCap     = 'round';

  if(style === 'dashed'){
    ctx.setLineDash([8,5]);
  } else if(style === 'wave'){
    drawWaveLine(a.x, a.y, b.x, b.y, col, lw);
    ctx.restore();
    return;
  } else {
    ctx.setLineDash([]);
  }

  ctx.beginPath();
  ctx.moveTo(a.x, a.y);
  ctx.lineTo(b.x, b.y);
  ctx.stroke();
  ctx.setLineDash([]);

  // Arrowhead
  if(line.arrow !== false){
    const ang = Math.atan2(b.y-a.y, b.x-a.x);
    const hs = 12;
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.moveTo(b.x, b.y);
    ctx.lineTo(b.x - hs*Math.cos(ang-0.4), b.y - hs*Math.sin(ang-0.4));
    ctx.lineTo(b.x - hs*Math.cos(ang+0.4), b.y - hs*Math.sin(ang+0.4));
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
}

function drawWaveLine(x1,y1,x2,y2,col,lw){
  const dx=x2-x1, dy=y2-y1;
  const len=Math.sqrt(dx*dx+dy*dy);
  const steps=Math.max(4,Math.floor(len/10));
  const amp=6;
  const nx=-dy/len, ny=dx/len;
  ctx.save();
  ctx.strokeStyle=col; ctx.lineWidth=lw; ctx.lineCap='round';
  ctx.beginPath();
  for(let i=0;i<=steps;i++){
    const t=i/steps;
    const wave=Math.sin(t*Math.PI*4)*amp*(1-t*0.3);
    const px=x1+dx*t+nx*wave;
    const py=y1+dy*t+ny*wave;
    if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
  }
  ctx.stroke();
  // Arrowhead
  const ang=Math.atan2(y2-y1,x2-x1);
  const hs=12;
  ctx.fillStyle=col;
  ctx.beginPath();
  ctx.moveTo(x2,y2);
  ctx.lineTo(x2-hs*Math.cos(ang-0.4),y2-hs*Math.sin(ang-0.4));
  ctx.lineTo(x2-hs*Math.cos(ang+0.4),y2-hs*Math.sin(ang+0.4));
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawPreviewLine(start, end){
  const a = fieldToCanvas(start.x, start.y);
  const b = end;
  ctx.save();
  ctx.strokeStyle = arrowColor;
  ctx.lineWidth = 2;
  ctx.setLineDash([5,4]);
  ctx.globalAlpha = 0.6;
  ctx.beginPath();
  ctx.moveTo(a.x,a.y);
  ctx.lineTo(b.x,b.y);
  ctx.stroke();
  ctx.restore();
}

// ============================================================
// HIT TEST
// ============================================================
function hitTest(cx,cy){
  const s = fieldScale();
  for(let i=objects.length-1;i>=0;i--){
    const obj=objects[i];
    const p=fieldToCanvas(obj.fx,obj.fy);
    const r = obj.type==='player' ? 16 : obj.type==='text' ? 20 : 14;
    const dx=cx-p.x, dy=cy-p.y;
    if(dx*dx+dy*dy <= r*r) return obj;
  }
  return null;
}

// ============================================================
// MOUSE / TOUCH
// ============================================================
let mousePos = null;

canvas.addEventListener('mousedown', onMouseDown);
canvas.addEventListener('mousemove', onMouseMove);
canvas.addEventListener('mouseup',   onMouseUp);
canvas.addEventListener('contextmenu', onContextMenu);
canvas.addEventListener('dblclick',  onDblClick);
canvas.addEventListener('wheel', onWheel, {passive:false});

function canvasXY(e){
  const r=canvas.getBoundingClientRect();
  return {x:e.clientX-r.left, y:e.clientY-r.top};
}

function onMouseDown(e){
  closeContextMenu();
  const p = canvasXY(e);
  if(e.button===1){ isPanning=true; panStart={x:e.clientX-panOff.x, y:e.clientY-panOff.y}; e.preventDefault(); return; }
  if(e.button===2) return; // handled by contextmenu
  if(e.button!==0) return;

  if(drawMode === 'text'){
    const fp = canvasToField(p.x,p.y);
    openTextPopup(fp.x, fp.y);
    return;
  }

  // Active tool placement mode - but allow clicking existing objects
  if(activeTool){
    const hit=hitTest(p.x,p.y);
    if(hit){
      // Click on existing object → select it, don't place
      selected=hit.id;
      dragObj=hit;
      dragMoved=false;
      dragStartFx=hit.fx;
      dragStartFy=hit.fy;
      const hp=fieldToCanvas(hit.fx,hit.fy);
      dragOffX=p.x-hp.x; dragOffY=p.y-hp.y;
      render();
    } else {
      // Click on empty field → place tool
      const fp = canvasToField(p.x,p.y);
      placeActiveTool(fp.x, fp.y);
    }
    return;
  }

  if(drawMode){
    const fp = canvasToField(p.x,p.y);
    if(!drawStart){ drawStart={x:fp.x,y:fp.y}; mousePos=p; return; }
    pushUndo();
    drawLines.push({id:newId(),x1:drawStart.x,y1:drawStart.y,x2:fp.x,y2:fp.y,color:arrowColor,style:arrowStyle,arrow:true});
    drawStart=null; mousePos=null;
    render(); scheduleKadrivoSave(); return;
  }

  const hit=hitTest(p.x,p.y);
  if(hit){
    selected=hit.id;
    dragObj=hit;
    dragMoved=false;
    // Save drag-start position for undo
    dragStartFx=hit.fx;
    dragStartFy=hit.fy;
    const hp=fieldToCanvas(hit.fx,hit.fy);
    dragOffX=p.x-hp.x; dragOffY=p.y-hp.y;
    render();
  } else {
    selected=null;
    dragObj=null;
    // start pan
    isPanning=true;
    panStart={x:e.clientX-panOff.x, y:e.clientY-panOff.y};
    render();
  }
}

function onMouseMove(e){
  const p=canvasXY(e);
  mousePos=p;
  if(isPanning){
    panOff={x:e.clientX-panStart.x, y:e.clientY-panStart.y};
    calcFieldRect(); render(); return;
  }
  if(dragObj){
    const fp=canvasToField(p.x-dragOffX, p.y-dragOffY);
    dragObj.fx = Math.max(0,Math.min(FIELD.w,fp.x));
    dragObj.fy = Math.max(0,Math.min(FIELD.h,fp.y));
    dragMoved = true;
    render(); return;
  }
  if(drawMode && drawStart){ render(); }
}

function onMouseUp(e){
  if(e.button===1){ isPanning=false; return; }
  if(isPanning && !dragObj){ isPanning=false; return; }
  if(dragObj){
    if(dragMoved){
      // Insert undo entry with original position
      const finalFx=dragObj.fx, finalFy=dragObj.fy;
      dragObj.fx=dragStartFx; dragObj.fy=dragStartFy;
      pushUndo();
      dragObj.fx=finalFx; dragObj.fy=finalFy;
      scheduleKadrivoSave();
    }
    dragObj=null;
    dragMoved=false;
    isPanning=false;
    render();
  }
}

function onDblClick(e){
  const p=canvasXY(e);
  const hit=hitTest(p.x,p.y);
  if(hit) removeObject(hit.id);
}

function onContextMenu(e){
  e.preventDefault();
  const p=canvasXY(e);
  const hit=hitTest(p.x,p.y);
  if(!hit){ closeContextMenu(); return; }
  selected=hit.id;
  ctxTarget=hit;
  const menu=document.getElementById('ctx-menu');
  // show/hide color option
  document.getElementById('ctx-color').style.display = (hit.type==='text'||hit.type==='player'||hit.type==='cone'||hit.type==='pole') ? '' : 'none';
  document.getElementById('ctx-label').style.display = (hit.type==='player'||hit.type==='text') ? '' : 'none';
  menu.style.left=e.clientX+'px';
  menu.style.top =e.clientY+'px';
  menu.style.display='block';
  render();
}

function onWheel(e){
  e.preventDefault();
  const delta = e.deltaY>0 ? 0.9 : 1.1;
  zoom = Math.max(0.5, Math.min(3, zoom*delta));
  calcFieldRect(); render();
}

function closeContextMenu(){ document.getElementById('ctx-menu').style.display='none'; }
document.addEventListener('click', (e)=>{ if(!e.target.closest('#ctx-menu')) closeContextMenu(); });

// ============================================================
// OBJECT MANAGEMENT
// ============================================================
function addObject(obj){
  pushUndo();
  if(!obj.id) obj.id=newId();
  objects.push(obj);
  render();
  updateSidebar();
  scheduleKadrivoSave();
}

function removeObject(id){
  pushUndo();
  const idx=objects.findIndex(o=>o.id===id);
  if(idx>=0){
    const o=objects[idx];
    if(o.playerId){
      // mark player as off-field in sidebar
      const el=document.querySelector(`.player-item[data-pid="${o.playerId}"]`);
      if(el) el.classList.remove('on-field');
    }
    objects.splice(idx,1);
  }
  if(selected===id) selected=null;
  render();
  updatePlayerCount();
  scheduleKadrivoSave();
}

function clearAll(){
  if(!confirm('Alle Objekte und Zeichnungen entfernen?')) return;
  pushUndo();
  objects=[];
  drawLines=[];
  selected=null;
  document.querySelectorAll('.player-item').forEach(el=>el.classList.remove('on-field'));
  render();
  updatePlayerCount();
  scheduleKadrivoSave();
}

// ============================================================
// UNDO
// ============================================================
function pushUndo(){
  undoStack.push({
    objects: JSON.parse(JSON.stringify(objects)),
    drawLines: JSON.parse(JSON.stringify(drawLines))
  });
  if(undoStack.length>40) undoStack.shift();
}

function undo(){
  if(!undoStack.length) return;
  const state=undoStack.pop();
  objects=state.objects;
  drawLines=state.drawLines;
  selected=null;
  document.querySelectorAll('.player-item').forEach(el=>{
    const pid=el.dataset.pid;
    const onField=objects.some(o=>o.playerId===pid);
    el.classList.toggle('on-field',onField);
  });
  render();
  updatePlayerCount();
  scheduleKadrivoSave();
}

function addPlayerToField(player){
  if(objects.some(o=>o.playerId===player.id&&!o.isBench)) return;
  const isGk = (player.pos||player.position||'').toLowerCase().includes('torwart') || (player.pos||player.position||'').toLowerCase()==='gk';
  const col = player.team==='away' ? awayColor : isGk ? gkColor : homeColor;
  addObject({
    type:'player', id:newId(),
    fx: player.team==='away' ? 80 : 25,
    fy: 34,
    color: player.color || col,
    name: player.name,
    num:  player.num || player.number || '',
    playerId: player.id,
    starter: true
  });
  const el=document.querySelector(`.player-item[data-pid="${player.id}"]`);
  if(el) el.classList.add('on-field');
  updatePlayerCount();
}

function addBenchPlayer(player){
  if(objects.some(o=>o.playerId===player.id)) return;
  const benchCount=objects.filter(o=>o.isBench).length;
  addObject({
    type:'player', id:newId(),
    fx: benchCount*8+4,
    fy: 64,
    color: '#555555',
    name: player.name,
    num:  player.num || player.number || '',
    playerId: player.id,
    isBench: true,
    starter: false
  });
  const el=document.querySelector(`.player-item[data-pid="${player.id}"]`);
  if(el) el.classList.add('on-field');
  updatePlayerCount();
}

// ── ACTIVE TOOL MODE ─────────────────────────────────────────
// Wie im 3D-Board: Tool aktivieren → endlos platzieren bis ESC
let activeTool = null; // {type, ...params}

function setActiveTool(toolId, params){
  // Toggle: nochmal klicken deaktiviert
  if(activeTool && activeTool.id === toolId){
    activeTool = null;
    document.querySelectorAll('.tool-item').forEach(el=>el.classList.remove('active'));
    canvas.style.cursor = 'default';
    document.getElementById('s-mode').textContent = 'Modus: Auswahl';
    return;
  }
  activeTool = {id: toolId, ...params};
  // Zeichenmodus deaktivieren
  drawMode = null; drawStart = null;
  document.querySelectorAll('.draw-item').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tool-item').forEach(el=>el.classList.remove('active'));
  const btn = document.getElementById('atool-'+toolId);
  if(btn) btn.classList.add('active');
  canvas.style.cursor = 'crosshair';
  document.getElementById('s-mode').textContent = 'Modus: Platzieren – Klick auf Feld, ESC zum Beenden';
  render();
}

function placeActiveTool(fx, fy){
  if(!activeTool) return;
  const t = activeTool;
  let obj = null;
  if(t.type==='ball')    obj={type:'ball',id:newId(),fx,fy};
  if(t.type==='cone')    obj={type:'cone',id:newId(),fx,fy,color:t.color||'#ff5500'};
  if(t.type==='pole')    obj={type:'pole',id:newId(),fx,fy,horizontal:t.horizontal||false,color:'#cc0000'};
  if(t.type==='goal')    obj={type:'goal',id:newId(),fx,fy,goalW:t.goalW||7.32,goalH:t.goalH||2.44};
  if(t.type==='trainingPlayer') obj={type:'player',id:newId(),fx,fy,color:t.color||'#e63946',name:'',num:''};
  if(obj){ pushUndo(); objects.push(obj); render(); scheduleKadrivoSave(); }
}

function cancelActiveTool(){
  activeTool = null;
  document.querySelectorAll('.tool-item').forEach(el=>el.classList.remove('active'));
  canvas.style.cursor = 'default';
  document.getElementById('s-mode').textContent = 'Modus: Auswahl';
  render();
}

document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){
    if(activeTool){ cancelActiveTool(); return; }
    if(drawMode){ setDrawMode(null); return; }
    if(drawStart){ drawStart=null; mousePos=null; render(); }
  }
});

function addCone(color){ addObject({type:'cone',id:newId(),fx:FIELD.w/2,fy:FIELD.h/2,color:color||'#ff5500'}); }
function addBall(){      addObject({type:'ball',id:newId(),fx:FIELD.w/2,fy:FIELD.h/2}); }

// Generic formations for other player counts
function genericFormation(count){
  const slots=[];
  slots.push([FIELD.w*0.1, FIELD.h/2]);
  const outfield=count-1;
  const rows=outfield<=3?1:outfield<=6?2:outfield<=9?3:4;
  const perRow=Math.ceil(outfield/rows);
  for(let r=0;r<rows;r++){
    const cnt=Math.min(perRow,outfield-r*perRow);
    const x=FIELD.w*0.18+r*(FIELD.w*0.55/rows);
    for(let i=0;i<cnt;i++){
      const y=FIELD.h*0.1+((FIELD.h*0.8/(cnt+1))*(i+1));
      slots.push([x,y]);
    }
  }
  return slots;
}

    if(el) el.classList.remove('on-field');
  });
  objects=objects.filter(o=>!(o.type==='player'&&o.playerId&&!o.playerId.startsWith('away_')));

  const allHome=kadrivoPlayers.filter(p=>p.team!=='away');
  const starters=allHome.slice(0,fieldLimit);
  const bench=allHome.slice(fieldLimit,fieldLimit+benchLimit);

  if(currentSport==='Fussball'){
    const slots=getFormationSlots(starters.length);
    starters.forEach((p,i)=>{
      const pos=slots[i]||[FIELD.w/2,FIELD.h/2];
      const col=isGkPosition(p.pos)?gkColor:homeColor;
      objects.push({type:'player',id:newId(),fx:pos[0],fy:pos[1],color:p.color||col,name:p.name,num:p.num||'',playerId:p.id,starter:true});
      const el=document.querySelector(`.player-item[data-pid="${p.id}"]`);
      if(el) el.classList.add('on-field');
    });
  } else {
    const formation=SPORT_AUTO_FORMATIONS[currentSport];
    const gkPlayers=starters.filter(p=>isGkPosition(p.pos));
    const fieldPlayers=starters.filter(p=>!isGkPosition(p.pos));

    if(formation){
      let slotIdx=0;
      // Torwart(e) zuerst
      gkPlayers.forEach((p,i)=>{
        const slot=formation.gk[i];
        if(!slot) return;
        objects.push({type:'player',id:newId(),fx:slot[0],fy:slot[1],color:p.color||gkColor,name:p.name,num:p.num||'',playerId:p.id,starter:true});
        const el=document.querySelector(`.player-item[data-pid="${p.id}"]`);
        if(el) el.classList.add('on-field');
      });
      // Feldspieler
      fieldPlayers.forEach((p,i)=>{
        const slot=formation.field[i];
        if(!slot) return;
        objects.push({type:'player',id:newId(),fx:slot[0],fy:slot[1],color:p.color||homeColor,name:p.name,num:p.num||'',playerId:p.id,starter:true});
        const el=document.querySelector(`.player-item[data-pid="${p.id}"]`);
        if(el) el.classList.add('on-field');
      });
    } else {
      // Fallback genericFormation
      const slots=genericFormation(starters.length);
      starters.forEach((p,i)=>{
        const pos=slots[i]||[FIELD.w/2,FIELD.h/2];
        const col=isGkPosition(p.pos)?gkColor:homeColor;
        objects.push({type:'player',id:newId(),fx:pos[0],fy:pos[1],color:p.color||col,name:p.name,num:p.num||'',playerId:p.id,starter:true});
        const el=document.querySelector(`.player-item[data-pid="${p.id}"]`);
        if(el) el.classList.add('on-field');
      });
    }
  }

  // Bank entlang unterer Feldkante
  bench.forEach((p,i)=>{
    const benchX=Math.min(FIELD.w-1, 1+i*(FIELD.w/Math.max(benchLimit,1)));
    objects.push({type:'player',id:newId(),fx:benchX,fy:FIELD.h-0.8,color:'#555555',name:p.name,num:p.num||'',playerId:p.id,starter:false,isBench:true});
    const el=document.querySelector(`.player-item[data-pid="${p.id}"]`);
    if(el) el.classList.add('on-field');
  });

  render();
  updatePlayerCount();
  scheduleKadrivoSave();
}

// ============================================================
// KADRIVO PROTOCOL (same as 3D board)
// ============================================================
function scheduleKadrivoSave(){
  if(!kadrivoReady||kadrivoHydrating||!kadrivoBoardId) return;
  clearTimeout(kadrivoSaveTimer);
  kadrivoSaveTimer=setTimeout(postKadrivoSave,400);
}

function postKadrivoSave(){
  if(!kadrivoReady||!kadrivoBoardId||!window.parent||window.parent===window) return;
  window.parent.postMessage({
    type:'kadrivo:tactic-save',
    boardId:kadrivoBoardId,
    state:exportState()
  }, window.location.origin);
}

function exportState(){
  return {objects, drawLines, showNames, arrowColor, arrowStyle};
}

function importState(saved, players){
  kadrivoPlayers = players||[];
  if(saved){
    objects   = saved.objects   || [];
    drawLines = saved.drawLines || [];
    showNames = saved.showNames || false;
    arrowColor= saved.arrowColor|| '#ffffff';
    arrowStyle= saved.arrowStyle|| 'solid';
    let maxId=0;
    [...objects,...drawLines].forEach(o=>{ const n=parseInt((o.id||'').replace('o',''));if(n>maxId)maxId=n; });
    oidSeq=maxId+1;
  }
  updateSidebar();
  updatePlayerCount();
  render();
}

window.addEventListener('message',(event)=>{
  if(event.origin!==window.location.origin) return;
  const data=event.data||{};
  if(data.type==='kadrivo:tactic-export-request'){
    if(!data.boardId||data.boardId===kadrivoBoardId) postKadrivoSave();
    return;
  }
  if(data.type!=='kadrivo:tactic-load') return;
  kadrivoBoardId=data.boardId||null;
  kadrivoReady=true;
  if(data.players) kadrivoPlayers=data.players;
  if(data.limits){
    fieldLimit=data.limits.fieldPlayers||11;
    benchLimit=data.limits.benchPlayers??9;
  }
  if(data.sport) { currentSport=data.sport; updateFieldDimensions(); }
  homeColor=data.homeColor||COLORS_HOME;
  awayColor=data.awayColor||COLORS_AWAY;
  gkColor  =data.gkColor  ||COLORS_GK;
  // Update formation bar visibility
  updateFormationBar();
  kadrivoHydrating=true;
  try{
    importState(data.saved,data.players||[]);
  } finally {
    kadrivoHydrating=false;
  }
});

function updateFormationBar(){
  const bar=document.getElementById('formation-bar-2d');
  if(!bar) return;
  // Show formations only for Fussball with 11 players
  bar.style.display=(currentSport==='Fussball'&&fieldLimit===11)?'flex':'none';
}

// ============================================================
// INIT
// ============================================================
window.addEventListener('resize', resize);
updateFieldDimensions();
resize();

const PRESET_COLORS_GLOBAL = PRESET_COLORS;
</script>
