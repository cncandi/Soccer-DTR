name: FTP Diagnose

on:
  workflow_dispatch:

jobs:
  list:
    runs-on: ubuntu-latest
    steps:
      - name: List FTP directories
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          set +x
          list_dir() {
            path="$1"
            echo "---- $path ----"
            curl --silent --show-error --user "$FTP_USERNAME:$FTP_PASSWORD" "ftp://$FTP_SERVER/$path" || true
            echo
          }

          list_dir ""
          list_dir "soccer/"
          list_dir "www/"
          list_dir "www/soccer/"
          list_dir "public_html/"
          list_dir "public_html/soccer/"
          list_dir "html/"
          list_dir "html/soccer/"
          list_dir "htdocs/"
          list_dir "htdocs/soccer/"
